name: Daily corpus ingest

on:
  schedule:
    # 05:00 UTC = 10:30 Asia/Kolkata (IST)
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: ingest-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Cache Hugging Face models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            hf-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Build corpus
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python scripts/build_corpus.py --no-playwright

      - name: Commit updated corpus to repository
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/chunks.jsonl data/processed/last_ingest.json
          if git diff --staged --quiet; then
            echo "No corpus changes to commit."
          else
            git commit -m "$(cat <<EOF
          chore(ingest): refresh corpus from daily workflow

          Run ID: ${{ github.run_id }}
          EOF
          )"
            git push
          fi

      - name: Upload corpus artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: corpus-${{ github.run_id }}
          path: |
            data/chroma/
            data/processed/
          retention-days: 90
          if-no-files-found: warn
